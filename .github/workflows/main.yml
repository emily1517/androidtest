name: Android Emulator Backup Test

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD created."

      - name: Boot emulator, write test session marker, shut down cleanly
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb devices
            adb wait-for-device

            # Simulate a logged-in app's session data.
            # Real apps store login tokens/cookies in files exactly like this,
            # under /data. If this file survives a restore byte-for-byte,
            # an app's real session data would too.
            MARKER="session_token=abc123-test-$(date +%s); user=testuser; logged_in=true"
            echo "Writing marker: $MARKER"
            adb shell "mkdir -p /data/local/tmp/faketest"
            adb shell "echo '$MARKER' > /data/local/tmp/faketest/session.txt"
            adb shell "cat /data/local/tmp/faketest/session.txt"

            # Also set a system setting as a second, independent marker
            adb shell settings put system backup_test_marker "restored-ok-12345"
            adb shell settings get system backup_test_marker

            echo "--- Markers written, shutting down emulator ---"
            adb emu kill
            sleep 5

      - name: Archive AVD state
        run: |
          mkdir -p backup
          tar -czf backup/avd-backup.tar.gz -C ~/.android avd
          ls -lh backup/

      - name: Upload backup as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: avd-backup
          path: backup/avd-backup.tar.gz
          retention-days: 14

      - name: Publish backup as a GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: avd-backup-${{ github.run_id }}
          name: AVD Backup ${{ github.run_id }}
          files: backup/avd-backup.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
