name: Android Emulator Restore Test

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'owner/repo where the backup release lives (leave blank if same repo)'
        required: false
      release_tag:
        description: 'Release tag of the backup to restore (e.g. avd-backup-123456)'
        required: true

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download backup release asset
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_PAT || github.token }}
        run: |
          mkdir -p ~/.android
          REPO="${{ github.event.inputs.source_repo }}"
          if [ -z "$REPO" ]; then REPO="${{ github.repository }}"; fi
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "$REPO" \
            --pattern "avd-backup.tar.gz" \
            --output avd-backup.tar.gz
          tar -xzf avd-backup.tar.gz -C ~/.android
          ls -la ~/.android/avd

      - name: Boot emulator and verify markers survived
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb devices
            adb wait-for-device

            echo "=== Checking file-based marker ==="
            if adb shell "cat /data/local/tmp/faketest/session.txt" 2>/dev/null; then
              echo "PASS: session.txt found and readable after restore"
            else
              echo "FAIL: session.txt missing after restore"
              exit 1
            fi

            echo "=== Checking system-setting marker ==="
            VALUE=$(adb shell settings get system backup_test_marker | tr -d '\r')
            echo "Restored value: $VALUE"
            if [ "$VALUE" = "restored-ok-12345" ]; then
              echo "PASS: system setting marker matches exactly"
            else
              echo "FAIL: system setting marker did not match (got: $VALUE)"
              exit 1
            fi

            echo "=== RESULT: backup/restore preserved data exactly ==="
